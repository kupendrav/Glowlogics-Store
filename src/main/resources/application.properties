spring.application.name=glowlogics-store
server.port=${PORT:8080}

spring.datasource.url=jdbc:sqlite:${DATABASE_PATH:./glowlogics.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

app.jwt.secret=GlowLogicsSecretKeyForJwtSigningAndValidation2026
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# Unsplash API configuration (set access key via env var in production)
app.unsplash.api-url=https://api.unsplash.com
app.unsplash.access-key=${UNSPLASH_ACCESS_KEY:}
