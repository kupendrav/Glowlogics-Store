<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics Admin | Products</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/typography.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body data-admin-page="products">
    <header class="site-header">
      <div class="container">
        <a href="../index.html" class="logo">GlowLogics Admin</a>
      </div>
    </header>

    <main class="admin-shell">
      <aside class="admin-sidebar">
        <nav>
          <a href="../admin/dashboard.html">Dashboard</a>
          <a class="active" href="../admin/manage-products.html">Manage Products</a>
          <a href="../admin/manage-orders.html">Manage Orders</a>
          <a href="../admin/manage-users.html">Manage Users</a>
          <a href="../index.html" data-action="logout">Logout</a>
        </nav>
      </aside>

      <section class="admin-main">
        <h1>Manage Products</h1>
        <p id="adminProductModeLabel" class="text-secondary">Add a new product</p>
        <form id="adminProductForm" class="card glass admin-product-form">
          <input type="hidden" name="id" />
          <div class="admin-product-grid">
            <label>Product Name<input class="form-control" name="name" required placeholder="Ex: Nebula Smart Lamp" /></label>
            <label>Category<input class="form-control" name="category" required placeholder="Ex: Home" /></label>
            <label>Price<input class="form-control" name="price" type="number" min="0" step="0.01" required placeholder="Ex: 149.99" /></label>
            <label>Discount Price (optional)<input class="form-control" name="discountPrice" type="number" min="0" step="0.01" placeholder="Ex: 129.99" /></label>
            <label>Stock Quantity<input class="form-control" name="stock" type="number" min="0" required placeholder="Ex: 40" /></label>
            <label>Rating<input class="form-control" name="rating" type="number" min="0" max="5" step="0.1" value="4.5" /></label>
            <label>Review Count<input class="form-control" name="reviewCount" type="number" min="0" value="0" /></label>
          </div>

          <label>Description<textarea class="form-control" name="description" rows="3" required placeholder="Product description to display to customers"></textarea></label>

          <div class="admin-product-media-grid">
            <label>Primary Image Link<input class="form-control" name="imageUrl" type="url" required placeholder="https://..." /></label>
            <label>Gallery Image Link 2<input class="form-control" name="imageUrl2" type="url" placeholder="https://..." /></label>
            <label>Gallery Image Link 3<input class="form-control" name="imageUrl3" type="url" placeholder="https://..." /></label>
          </div>

          <div class="admin-form-actions">
            <button id="adminProductReset" class="btn btn-secondary" type="button">Reset Form</button>
            <button class="btn btn-primary" type="submit"><span id="adminProductSubmitLabel">Add Product</span></button>
          </div>
        </form>

        <section id="adminProductPreview" class="admin-product-preview"></section>
        <section id="adminProductsTable" class="card glass"></section>
      </section>
    </main>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
