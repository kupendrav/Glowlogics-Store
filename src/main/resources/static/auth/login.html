<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics | Login</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/typography.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body data-page="login">
    <div class="page-bg-layer"></div>

    <header class="site-header">
      <div class="container">
        <a href="../index.html" class="logo">GlowLogics</a>
        <nav class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../products.html">Products</a>
          <a class="active" href="../auth/login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="auth-layout">
      <section class="card glass reveal" style="width:min(100%,440px)">
        <h1>Welcome Back</h1>
        <p class="text-secondary">Sign in to continue your GlowLogics experience.</p>

        <form id="loginForm" style="display:grid;gap:.8rem;margin-top:.8rem">
          <label>
            <span class="text-secondary">Email</span>
            <input class="form-control" name="email" type="email" required />
          </label>
          <label>
            <span class="text-secondary">Password</span>
            <input class="form-control" name="password" type="password" required />
          </label>
          <label style="display:flex;align-items:center;gap:.5rem">
            <input type="checkbox" name="remember" /> Remember me
          </label>

          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <div style="margin-top:1rem;display:flex;justify-content:space-between;gap:.5rem;flex-wrap:wrap">
          <a class="text-secondary" href="../auth/forgot-password.html">Forgot password?</a>
          <a class="text-secondary" href="../auth/signup.html">Create an account</a>
        </div>

        <div style="display:grid;gap:.5rem;margin-top:1rem">
          <button class="btn btn-secondary" type="button">Continue with Google (simulated)</button>
          <button class="btn btn-secondary" type="button">Continue with GitHub (simulated)</button>
        </div>

        <p class="text-secondary" style="margin-top:.9rem;font-size:.85rem">
          Admin accounts are redirected to the dedicated Admin Console after login.
        </p>
      </section>
    </main>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
