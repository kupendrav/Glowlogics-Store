<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics | Reset Password</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/typography.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body data-page="forgot-password">
    <div class="page-bg-layer"></div>

    <header class="site-header">
      <div class="container">
        <a href="../index.html" class="logo">GlowLogics</a>
      </div>
    </header>

    <main class="auth-layout">
      <section class="card glass reveal" style="width:min(100%,420px)">
        <h1>Reset Password</h1>
        <p class="text-secondary">Enter your email and we will send a reset link (simulation).</p>
        <form id="forgotPasswordForm" style="display:grid;gap:.8rem;margin-top:.8rem">
          <label>Email<input class="form-control" type="email" required /></label>
          <button class="btn btn-primary" type="submit">Send Reset Link</button>
        </form>
        <p class="text-secondary" style="margin-top:1rem"><a href="../auth/login.html">Back to login</a></p>
      </section>
    </main>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
