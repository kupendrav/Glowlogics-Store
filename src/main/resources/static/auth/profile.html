<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics | Profile</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/typography.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body data-page="profile">
    <div class="page-bg-layer"></div>
    <header class="site-header">
      <div class="container">
        <a href="../index.html" class="logo">GlowLogics</a>
        <nav class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../products.html">Products</a>
          <a href="../wishlist.html">Wishlist <span class="wishlist-badge" style="display:none">0</span></a>
          <a href="../cart.html">Cart <span class="cart-badge" style="display:none">0</span></a>
          <a class="active" href="../auth/profile.html">Profile</a>
        </nav>
      </div>
    </header>

    <main class="main-content container">
      <div class="grid-2">
        <section class="card glass reveal">
          <h2>Profile</h2>
          <div style="display:flex;align-items:center;gap:.8rem;margin:.8rem 0">
            <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(140deg,#2d1b4e,#00d9ff)"></div>
            <button class="btn btn-secondary" type="button">Upload Avatar</button>
          </div>

          <form id="profileForm" style="display:grid;gap:.7rem">
            <label>Full Name<input id="profileName" name="fullName" class="form-control" /></label>
            <label>Email<input id="profileEmail" name="email" class="form-control" /></label>
            <label>Phone<input id="profilePhone" name="phone" class="form-control" /></label>
            <button class="btn btn-primary" type="submit">Save Profile</button>
          </form>
        </section>

        <section class="card glass reveal">
          <h2>Account Settings</h2>
          <div style="display:grid;gap:.5rem">
            <label><input type="checkbox" checked /> Enable two-factor authentication</label>
            <label><input type="checkbox" checked /> Receive order notifications</label>
            <label><input type="checkbox" /> Marketing emails</label>
          </div>
          <button class="btn btn-secondary" type="button" style="margin-top:.8rem">Change Password</button>
          <a id="profileAdminLink" class="btn btn-secondary" href="../admin/dashboard.html" style="margin-top:.8rem;display:none">Open Admin Console</a>
          <button class="btn btn-accent" data-action="logout" type="button" style="margin-top:.8rem">Logout</button>
        </section>
      </div>

      <section class="section card glass reveal">
        <div class="section-head" style="margin-top:0">
          <h3>Order History</h3>
        </div>
        <div id="profileOrders"></div>
      </section>
    </main>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
