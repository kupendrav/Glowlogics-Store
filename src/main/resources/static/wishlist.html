<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics | Wishlist</title>
    <link rel="stylesheet" href="./css/theme.css" />
    <link rel="stylesheet" href="./css/typography.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body data-page="wishlist">
    <div class="page-bg-layer"></div>
    <header class="site-header">
      <div class="container">
        <a href="./index.html" class="logo">GlowLogics</a>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./products.html">Products</a>
          <a class="active" href="./wishlist.html">Wishlist <span class="wishlist-badge" style="display:none">0</span></a>
          <a href="./cart.html">Cart <span class="cart-badge" style="display:none">0</span></a>
        </nav>
      </div>
    </header>

    <main class="main-content container">
      <div class="section-head">
        <h1>My Wishlist</h1>
        <div style="display:flex;gap:.6rem;align-items:center">
          <button class="btn btn-secondary" id="shareWishlistBtn">Share wishlist</button>
          <select id="wishlistSort" class="form-control" style="max-width:180px">
            <option value="newest">Newest</option>
            <option value="priceAsc">Price low-high</option>
            <option value="priceDesc">Price high-low</option>
          </select>
        </div>
      </div>

      <section id="wishlistGrid" class="product-grid"></section>
      <section id="emptyWishlistState" class="card glass" style="display:none;text-align:center">
        <h3>Your wishlist is waiting for picks</h3>
        <p class="text-secondary">Save products you love and move them to cart anytime.</p>
        <a class="btn btn-primary" href="./products.html">Explore Products</a>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
