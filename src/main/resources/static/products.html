<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowLogics | Products</title>
    <link rel="stylesheet" href="./css/theme.css" />
    <link rel="stylesheet" href="./css/typography.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body data-page="products">
    <div class="page-bg-layer"></div>

    <header class="site-header">
      <div class="container">
        <a href="./index.html" class="logo">GlowLogics</a>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a class="active" href="./products.html">Products</a>
          <a href="./wishlist.html">Wishlist <span class="wishlist-badge" style="display:none">0</span></a>
          <a href="./cart.html">Cart <span class="cart-badge" style="display:none">0</span></a>
          <a href="./auth/profile.html">Profile</a>
        </nav>
        <div class="search-wrap" style="max-width:280px;width:100%">
          <input class="form-control" data-global-search placeholder="Search products" />
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container sidebar-layout products-sidebar-layout">
        <button
          id="filtersOpenBtn"
          class="btn btn-secondary products-filters-toggle"
          type="button"
          aria-controls="productsFiltersSidebar"
          aria-expanded="false"
        >
          Filter Products
        </button>

        <div id="productsFiltersBackdrop" class="products-filters-backdrop" hidden></div>

        <aside id="productsFiltersSidebar" class="card glass reveal products-filters-sidebar">
          <div class="products-filters-header">
            <h3>Filters</h3>
            <button id="filtersCloseBtn" class="btn btn-secondary products-filters-close" type="button" aria-label="Close filters">
              Close
            </button>
          </div>
          <form id="productFilters" style="display:grid;gap:.8rem;margin-top:.8rem">
            <label>
              <span class="text-secondary">Search</span>
              <input id="productsSearch" class="form-control" type="search" placeholder="name or category" />
            </label>

            <div>
              <p class="text-secondary" style="margin:.4rem 0">Category</p>
              <label><input type="checkbox" name="category" value="Tech" /> Tech</label><br />
              <label><input type="checkbox" name="category" value="Lifestyle" /> Lifestyle</label><br />
              <label><input type="checkbox" name="category" value="Accessories" /> Accessories</label><br />
              <label><input type="checkbox" name="category" value="Home" /> Home</label><br />
              <label><input type="checkbox" name="category" value="Gaming" /> Gaming</label><br />
              <label><input type="checkbox" name="category" value="Audio" /> Audio</label><br />
              <label><input type="checkbox" name="category" value="Wearables" /> Wearables</label><br />
              <label><input type="checkbox" name="category" value="Office" /> Office</label>
            </div>

            <label>
              <span class="text-secondary">Min Price</span>
              <input id="minPrice" class="form-control" type="number" min="0" placeholder="0" />
            </label>
            <label>
              <span class="text-secondary">Max Price</span>
              <input id="maxPrice" class="form-control" type="number" min="0" placeholder="500" />
            </label>

            <label>
              <span class="text-secondary">Rating</span>
              <select id="minRating" class="form-control">
                <option value="">Any</option>
                <option value="4.5">4.5+</option>
                <option value="4">4.0+</option>
                <option value="3">3.0+</option>
              </select>
            </label>

            <label><input id="availableOnly" type="checkbox" /> In stock only</label>

            <label>
              <span class="text-secondary">Sort by</span>
              <select id="productsSort" class="form-control">
                <option value="newest">Newest</option>
                <option value="priceAsc">Price: Low to high</option>
                <option value="priceDesc">Price: High to low</option>
                <option value="topRated">Top rated</option>
              </select>
            </label>

            <button id="clearFilters" type="button" class="btn btn-secondary">Clear all filters</button>
          </form>
        </aside>

        <section>
          <div class="section-head reveal" style="margin-top:0">
            <h1>All Products</h1>
            <div id="activeFilterBadges" style="display:flex;gap:.4rem;flex-wrap:wrap"></div>
          </div>

          <div id="noResults" class="card glass" style="display:none;text-align:center;margin-bottom:1rem">
            <h3>No products found</h3>
            <p class="text-secondary">Try fewer filters or return to the full catalog.</p>
            <a href="./products.html" class="btn btn-primary">Shop all products</a>
          </div>

          <div id="productsGrid" class="product-grid"></div>

          <div id="productsPagination" style="display:flex;gap:.6rem;justify-content:center;margin-top:1.2rem"></div>
        </section>
      </div>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
